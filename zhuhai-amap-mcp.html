<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>珠海高德地图导航</title>
    
    <!-- 高德地图 JavaScript API -->
    <script src="https://webapi.amap.com/maps?v=2.0&key=d456107058c54b073c0f944ab203e985"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f5f7fa; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 30px;
            background: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.2)), url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=2073&q=80');
            background-size: cover;
            background-position: center;
            color: white;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }
        
        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(74, 144, 226, 0.4), rgba(99, 179, 237, 0.3));
        }
        
        .header > * {
            position: relative;
            z-index: 1;
        }
        
        .header h1 { font-size: 2.5em; margin-bottom: 10px; }
        .header p { opacity: 0.9; }
        
        .map-container {
            width: 100%;
            height: 600px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            border: 3px solid #4a90e2;
            margin-bottom: 30px;
        }
        
        #amap-container {
            width: 100%;
            height: 100%;
        }
        
        .controls {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.05);
        }
        
        .day-filter {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }
        
        .day-button {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            background: #4a90e2;
            color: white;
            font-weight: bold;
        }
        
        .day-button.active {
            background: #357abd;
            transform: scale(1.05);
        }
        
        .navigation {
            text-align: center;
            margin-top: 30px;
        }
        
        .nav-button {
            display: inline-block;
            padding: 12px 30px;
            background: #4a90e2;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            margin: 0 10px;
            font-weight: bold;
        }
        
        .nav-button:hover {
            background: #357abd;
        }
        
        footer {
            text-align: center;
            margin-top: 40px;
            color: #666;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🗺️ 珠海高德地图导航</h1>
            <p>基于高德地图API · 中文地图 · 最准确的数据</p>
        </div>
        
        <div class="controls">
            <p><strong>筛选日期：</strong></p>
            <div class="day-filter">
                <button class="day-button active" data-day="all">全部行程</button>
                <button class="day-button" data-day="1">Day 1 (5/2)</button>
                <button class="day-button" data-day="2">Day 2 (5/3)</button>
                <button class="day-button" data-day="3">Day 3 (5/4)</button>
                <button class="day-button" data-day="4">Day 4 (5/5)</button>
                <button class="day-button" data-day="5">Day 5 (5/6)</button>
                <button class="day-button" data-day="6">Day 6 (5/7)</button>
            </div>
        </div>
        
        <div class="map-container">
            <div id="amap-container"></div>
        </div>
        
        <div class="navigation">
            <a href="index.html" class="nav-button">📋 返回行程计划</a>
            <a href="zhuhai-leaflet-map.html" class="nav-button">🗺️ 查看Leaflet地图</a>
        </div>
        
        <footer>
            <p>地图数据：高德地图 · 最后更新：2026年4月19日</p>
            <p>💡 提示：如果地图无法显示，请检查高德API密钥和域名白名单设置</p>
        </footer>
    </div>
    
    <script>
        // 行程数据
        const itineraryData = {
            days: [
                {
                    id: 1,
                    date: "5月2日（周五）",
                    title: "抵达珠海，海边初体验",
                    color: "#ff6b6b",
                    locations: [
                        { name: "珠海金湾机场", lng: 113.375, lat: 22.006, type: "airport", time: "下午抵达" },
                        { name: "德龙M酒店", lng: 113.578, lat: 22.271, type: "hotel", time: "入住" },
                        { name: "情侣路海边散步", lng: 113.588, lat: 22.276, type: "scenic", time: "傍晚" }
                    ]
                },
                {
                    id: 2,
                    date: "5月3日（周六）",
                    title: "淇澳岛一日游",
                    color: "#4ecdc4",
                    locations: [
                        { name: "淇澳岛", lng: 113.633, lat: 22.433, type: "island", time: "全天" },
                        { name: "白石街", lng: 113.635, lat: 22.435, type: "cultural", time: "上午" },
                        { name: "红树林湿地", lng: 113.630, lat: 22.428, type: "nature", time: "下午" }
                    ]
                },
                {
                    id: 3,
                    date: "5月4日（周日）",
                    title: "悠闲市区游",
                    color: "#ffd166",
                    locations: [
                        { name: "圆明新园", lng: 113.550, lat: 22.267, type: "park", time: "上午" },
                        { name: "珠海渔女", lng: 113.588, lat: 22.276, type: "landmark", time: "下午" },
                        { name: "日月贝歌剧院", lng: 113.590, lat: 22.278, type: "cultural", time: "傍晚" }
                    ]
                },
                {
                    id: 4,
                    date: "5月5日（周一）",
                    title: "转场长隆",
                    color: "#06d6a0",
                    locations: [
                        { name: "德龙M酒店退房", lng: 113.578, lat: 22.271, type: "hotel", time: "上午" },
                        { name: "前往横琴", lng: 113.550, lat: 22.150, type: "transfer", time: "中午" },
                        { name: "长隆企鹅酒店", lng: 113.554, lat: 22.131, type: "hotel", time: "入住" }
                    ]
                },
                {
                    id: 5,
                    date: "5月6日（周二）",
                    title: "海洋王国全日游",
                    color: "#118ab2",
                    locations: [
                        { name: "长隆海洋王国", lng: 113.554, lat: 22.131, type: "theme-park", time: "全天" },
                        { name: "鲸鲨馆", lng: 113.556, lat: 22.132, type: "aquarium", time: "上午" },
                        { name: "烟花秀", lng: 113.554, lat: 22.131, type: "show", time: "晚上" }
                    ]
                },
                {
                    id: 6,
                    date: "5月7日（周三）",
                    title: "返程日",
                    color: "#9d4edd",
                    locations: [
                        { name: "长隆企鹅酒店退房", lng: 113.554, lat: 22.131, type: "hotel", time: "上午" },
                        { name: "珠海金湾机场", lng: 113.375, lat: 22.006, type: "airport", time: "下午" }
                    ]
                }
            ]
        };
        
        // 高德地图实例
        let map = null;
        let markers = [];
        
        // 初始化地图
        function initMap() {
            if (!window.AMap) {
                console.error("高德地图API加载失败");
                document.getElementById("amap-container").innerHTML = 
                    '<div style="padding: 50px; text-align: center; color: #666;">' +
                    '<h3>❌ 高德地图加载失败</h3>' +
                    '<p>可能原因：</p>' +
                    '<ul style="text-align: left; display: inline-block;">' +
                    '<li>API密钥无效</li>' +
                    '<li>域名未在白名单中</li>' +
                    '<li>网络连接问题</li>' +
                    '</ul>' +
                    '<p style="margin-top: 20px;">请检查高德控制台设置，或使用 <a href="zhuhai-leaflet-map.html">Leaflet地图版本</a></p>' +
                    '</div>';
                return;
            }
            
            // 创建地图实例
            map = new AMap.Map('amap-container', {
                zoom: 11,
                center: [113.57, 22.27],
                viewMode: '2D',
                mapStyle: 'amap://styles/normal'
            });
            
            // 添加工具栏
            map.addControl(new AMap.ToolBar());
            map.addControl(new AMap.Scale());
            
            // 创建所有标记
            createMarkers();
            
            // 绑定按钮事件
            bindEvents();
        }
        
        // 创建标记
        function createMarkers() {
            itineraryData.days.forEach(day => {
                day.locations.forEach(location => {
                    const marker = new AMap.Marker({
                        position: [location.lng, location.lat],
                        title: location.name,
                        map: map,
                        extData: { dayId: day.id, location: location },
                        content: createMarkerContent(day.color),
                        offset: new AMap.Pixel(-12, -12)
                    });
                    
                    // 信息窗口
                    const infoWindow = new AMap.InfoWindow({
                        content: createInfoWindowContent(day, location),
                        offset: new AMap.Pixel(0, -30)
                    });
                    
                    marker.on('click', () => {
                        infoWindow.open(map, marker.getPosition());
                    });
                    
                    markers.push({ marker, dayId: day.id });
                });
            });
        }
        
        // 创建标记内容
        function createMarkerContent(color) {
            return `<div style="width: 24px; height: 24px; background: ${color}; border-radius: 50%; border: 3px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.3);"></div>`;
        }
        
        // 创建信息窗口内容
        function createInfoWindowContent(day, location) {
            const typeIcons = {
                airport: "🛫", hotel: "🏨", scenic: "🏖️", island: "🏝️",
                cultural: "🏛️", nature: "🌳", park: "🏞️", landmark: "🗽",
                transfer: "🚗", "theme-park": "🎢", aquarium: "🐠", show: "🎆"
            };
            
            return `
                <div style="padding: 15px; max-width: 250px;">
                    <h3 style="margin: 0 0 10px 0; color: #2c3e50; border-bottom: 2px solid ${day.color}; padding-bottom: 5px;">
                        ${typeIcons[location.type] || "📍"} ${location.name}
                    </h3>
                    <p style="margin: 5px 0;"><strong>日期：</strong>${day.date}</p>
                    <p style="margin: 5px 0;"><strong>时间：</strong>${location.time}</p>
                    <p style="margin: 5px 0;"><strong>类型：</strong>${getTypeName(location.type)}</p>
                    <div style="margin-top: 10px; padding: 8px; background: ${day.color}15; border-radius: 5px;">
                        <strong>行程主题：</strong>${day.title}
                    </div>
                </div>
            `;
        }
        
        // 获取类型名称
        function getTypeName(type) {
            const typeNames = {
                airport: "机场", hotel: "酒店", scenic: "景点", island: "海岛",
                cultural: "文化", nature: "自然", park: "公园", landmark: "地标",
                transfer: "交通", "theme-park": "主题公园", aquarium: "水族馆", show: "表演"
            };
            return typeNames[type] || type;
        }
        
        // 筛选标记
        function filterMarkers(dayId) {
            markers.forEach(({ marker, dayId: markerDayId }) => {
                if (dayId === 'all' || dayId == markerDayId) {
                    marker.show();
                } else {
                    marker.hide();
                }
            });
            
            // 更新按钮状态
            document.querySelectorAll('.day-button').forEach(btn => {
                if (btn.dataset.day === dayId) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }
        
        // 绑定事件
        function bindEvents() {
            document.querySelectorAll('.day-button').forEach(btn => {
                btn.addEventListener('click', function() {
                    filterMarkers(this.dataset.day);
                });
            });
            
            // 自动调整地图大小
            setTimeout(() => {
                if (map) map.setFitView();
            }, 100);
        }
        
        // 页面加载完成后初始化
        window.onload = initMap;
    </script>
</body>
</html>
