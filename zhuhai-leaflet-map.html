        .legend-item {

        .legend-color {

            height: 20px;
            border-radius: 50%;

        }
        
        .day-info {

        }
        
        .info-card {
            background: white;

        }

        .info-card h3 {

        .location-list {

        .weather-info {

                        }
                    ]
                },
                {
                    id: 3,
                    date: "5月4日（周日）",
                    title: "悠闲海边 + 早茶体验",
                    color: "#ffd166",
                    weather: { icon: "sunny", temp: "25-30°C", desc: "晴间多云" },
                    locations: [
                        {
                            name: "金悦轩/太阳与海",
                            lat: 22.250,
                            lng: 113.580,
                            type: "restaurant",
                            time: "早餐",

                        },

                        },

                        },

                },

                    locations: [
                        {

                            lat: 22.245,
                            lng: 113.577,
                            type: "hotel",
                            time: "退房",
                            description: "收拾行李，准备转场"
                        },
                        {

                            lat: 22.123,
                            lng: 113.567,
                            type: "hotel",
                            time: "入住：5月5-7日",
                            description: "长隆企鹅酒店，步行2分钟到海洋王国"
                        },
                        {
                            name: "海洋王国",
                            lat: 22.125,
                            lng: 113.570,
                            type: "park",
                            time: "下午-晚上",
                            description: "鲸鲨馆、企鹅馆、北极熊馆"
                        },
                        {

                            type: "show",

                        }
                    ]
                },
                {
                    id: 5,
                    date: "5月6日（周二）",
                    title: "海洋王国全日深度玩",
                    color: "#118ab2",
                    weather: { icon: "sunny", temp: "27-32°C", desc: "晴，炎热" },
                    locations: [
                        {

                            lat: 22.125,
                            lng: 113.570,
                            type: "park",
                            time: "全天",

                        },
                        {

                            lat: 22.127,

                            time: "下午",
                            description: "适合5岁孩子的温和游乐项目"
                        },
                        {

                            lat: 22.124,
                            lng: 113.569,
                            type: "restaurant",
                            time: "午餐（可选）",
                            description: "边看鱼边吃饭，需提前预订"
                        }
                    ]
                },
                {
                    id: 6,
                    date: "5月7日（周三）",
                    title: "飞船乐园 + 返程北京",
                    color: "#9d4edd",
                    weather: { icon: "sunny", temp: "26-31°C", desc: "晴" },
                    locations: [
                        {
                            name: "飞船乐园",
                            lat: 22.120,
                            lng: 113.565,
                            type: "park",
                            time: "上午",
                            description: "深海探险、珊瑚秘境等室内项目"
                        },
                        {
                            name: "珠海机场",
                            lat: 22.006,
                            lng: 113.376,
                            type: "airport",
                            time: "下午",
                            description: "返程北京，航班时间待定"
                        }
                    ]
                }
            ]
        };
        
        // 初始化地图
        let map = L.map('map').setView([22.27, 113.57], 11);
        
        // 添加OpenStreetMap图层
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
            maxZoom: 18
        }).addTo(map);
        
        // 存储所有标记
        let markers = [];
        let currentFilter = 'all';
        
        // 创建标记图标
        function createIcon(color) {
            return L.divIcon({
                className: 'custom-marker',
                html: `<div style="width: 24px; height: 24px; background: ${color}; border: 3px solid white; border-radius: 50%; box-shadow: 0 2px 5px rgba(0,0,0,0.3);"></div>`,
                iconSize: [24, 24],
                iconAnchor: [12, 12]
            });
        }
        
        // 添加所有标记
        function addMarkers() {
            itineraryData.days.forEach(day => {
                day.locations.forEach(location => {
                    const marker = L.marker([location.lat, location.lng], {
                        icon: createIcon(day.color)
                    })
                    .addTo(map)
                    .bindPopup(`
                        <h3>${location.name}</h3>
                        <p><strong>日期：</strong>Day ${day.id}（${day.date}）</p>
                        <p><strong>时间：</strong>${location.time}</p>
                        <p><strong>类型：</strong>${getTypeIcon(location.type)} ${location.type}</p>
                        <p>${location.description}</p>
                        <p><span class="weather-icon ${day.weather.icon}"></span> <strong>天气：</strong>${day.weather.desc}，${day.weather.temp}</p>
                    `);
                    
                    // 存储标记信息
                    marker.dayId = day.id;
                    markers.push(marker);
                });
            });
        }
        
        // 获取类型图标
        function getTypeIcon(type) {
            const icons = {
                airport: '✈️',
                hotel: '🏨',
                beach: '🏖️',
                restaurant: '🍽️',
                port: '🚢',
                park: '🌿',
                village: '🏘️',
                activity: '🚴',
                market: '🦞',
                show: '🎆',
                ride: '🎠'
            };
            return icons[type] || '📍';
        }
        
        // 筛选标记
        function filterMarkers(dayId) {
            currentFilter = dayId;
            markers.forEach(marker => {
                if (dayId === 'all' || marker.dayId === parseInt(dayId)) {
                    map.addLayer(marker);
                } else {
                    map.removeLayer(marker);
                }
            });
            
            // 更新按钮状态
            document.querySelectorAll('.day-button').forEach(btn => {
                if (btn.dataset.day === dayId) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
            
            // 更新信息卡片
            updateInfoCards(dayId);
        }
        
        // 更新信息卡片
        function updateInfoCards(dayId) {
            const container = document.querySelector('.day-info');
            container.innerHTML = '';
            
            const daysToShow = dayId === 'all' 
                ? itineraryData.days 
                : itineraryData.days.filter(day => day.id === parseInt(dayId));
            
            daysToShow.forEach(day => {
                const card = document.createElement('div');
                card.className = 'info-card';
                card.style.borderLeftColor = day.color;
                
                let locationsHtml = '';
                day.locations.forEach(loc => {
                    locationsHtml += `
                        <li>
                            <div class="location-bullet" style="background: ${day.color};"></div>
                            ${getTypeIcon(loc.type)} ${loc.name}（${loc.time}）
                        </li>
                    `;
                });
                
                card.innerHTML = `
                    <h3>
                        <div class="legend-color" style="background: ${day.color};"></div>
                        📅 Day ${day.id}：${day.date}
                    </h3>
                    <p><strong>主题：</strong>${day.title}</p>
                    <ul class="location-list">
                        ${locationsHtml}
                    </ul>
                    <div class="weather-info" style="background: ${day.color}15;">
                        <span class="weather-icon ${day.weather.icon}"></span>
                        <strong>天气预测：</strong>${day.weather.desc}，${day.weather.temp}
                    </div>
                `;
                
                container.appendChild(card);
            });
        }
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 添加标记
            addMarkers();
            
            // 初始显示所有标记和信息
            updateInfoCards('all');
            
            // 绑定筛选按钮事件
            document.querySelectorAll('.day-button').forEach(btn => {
                btn.addEventListener('click', function() {
                    filterMarkers(this.dataset.day);
                });
            });
            
            // 重置视图按钮
            document.getElementById('resetView').addEventListener('click', function() {
                map.setView([22.27, 113.57], 11);
                filterMarkers('all');
            });
            
            // 自动调整地图大小
            setTimeout(() => {
                map.invalidateSize();
            }, 100);
        });
    </script>
</body>
</html>
